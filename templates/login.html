{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lost and Found</title>
    <link rel="stylesheet" href="{% static 'css/modern.css' %}?v=3">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">🔍 Lost & Found</a>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your account</p>

                <form id="loginForm">
                    <div id="loginMessage"></div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </form>

                <div id="resendBox" style="display:none; margin-top: 16px; padding: 14px; border: 1px solid #e6e6e6; border-radius: 8px;">
                    <p style="margin: 0 0 10px; color: #555;">Need a new verification link?</p>
                    <button type="button" id="resendBtn" class="btn btn-secondary btn-block">Resend Verification Email</button>
                    <small style="display:block; margin-top:8px; color:#777;">We’ll send it to the email you entered above.</small>
                </div>

                <div class="auth-link">
                    Don't have an account? <a href="/signup/">Create one</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Lost & Found Application. All rights reserved.</p>
    </footer>

    <script src="{% static 'js/api.js' %}?v=3"></script>
    <script src="{% static 'js/ui.js' %}?v=3"></script>
    <script>
        API.init('/api');
        API.clearSession();

        const verifiedStatus = new URLSearchParams(window.location.search).get('verified');
        if (verifiedStatus === 'success') {
            UI.showFormMessage('Email verified successfully. You can now sign in.', 'success', 'loginMessage');
        } else if (verifiedStatus === 'invalid') {
            UI.showFormMessage('This verification link is invalid or has expired.', 'error', 'loginMessage');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            document.getElementById('resendBox').style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await API.login(email, password);
                UI.showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard/';
                }, 1000);
            } catch (error) {
                API.clearSession();
                UI.showFormMessage(error.message || 'Login failed', 'error');
                if ((error.message || '').toLowerCase().includes('verify your email')) {
                    document.getElementById('resendBox').style.display = 'block';
                }
            }
        });

        document.getElementById('resendBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            if (!email) {
                UI.showFormMessage('Please enter your email first.', 'error', 'loginMessage');
                return;
            }
            try {
                const result = await API.resendVerificationEmail(email);
                UI.showFormMessage(result.detail || 'If an account exists for that email, a verification link has been sent.', 'success', 'loginMessage');
            } catch (error) {
                UI.showFormMessage(error.message || 'Failed to resend verification email', 'error', 'loginMessage');
            }
        });
    </script>
</body>
</html>
